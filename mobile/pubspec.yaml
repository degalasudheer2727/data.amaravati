name: amara_twin
description: "data.amaravati — the hybrid mobile companion to the Amaravati open-data nexus & digital twin. Concept prototype."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  webview_flutter: ^4.7.0          # embeds the live 3D digital-twin web experience (true hybrid)
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1           # real Gmail SSO for the onboarding layer
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
