<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="theme-color" content="#070b14">
<meta name="description" content="Amaravati Data Command Center — a live mission-control console for the governed city-data platform and digital twin. Concept prototype.">
<title>Amaravati · Data Command Center</title>
<style>
  :root{
    --bg:#070b14; --bg2:#0b1120; --panel:rgba(255,255,255,.038); --panel2:rgba(255,255,255,.06);
    --line:rgba(255,255,255,.1); --line2:rgba(255,255,255,.06);
    --text:#e9eefb; --muted:rgba(233,238,251,.62); --muted2:rgba(233,238,251,.4);
    --acc:#33e0b6; --blue:#4d8dff; --amber:#ffb454; --rose:#ff6b8a; --violet:#9b8cff;
    --grad:linear-gradient(120deg,#33e0b6,#4d8dff);
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace; --display:'Georgia',serif;
    --r:16px; --r-sm:11px; --bar:54px; --rail:228px; --side:336px; --tick:38px;
    --shadow:0 30px 70px -40px rgba(0,0,0,.8);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;overflow:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(70% 60% at 70% 0,rgba(51,224,182,.1),transparent 60%),radial-gradient(60% 60% at 0% 100%,rgba(77,141,255,.12),transparent 60%);pointer-events:none}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;color:inherit}
  svg{display:block}
  .mono{font-family:var(--mono)}
  .glass{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);backdrop-filter:blur(14px)}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}

  /* ===== app grid ===== */
  .app{position:relative;z-index:1;display:grid;grid-template-rows:var(--bar) 1fr var(--tick);grid-template-columns:var(--rail) 1fr var(--side);grid-template-areas:"bar bar bar" "rail center side" "tick tick tick";height:100vh;height:100dvh;gap:1px;background:var(--line2)}
  .topbar{grid-area:bar;background:var(--bg);display:flex;align-items:center;gap:16px;padding:0 18px}
  .rail{grid-area:rail;background:var(--bg);overflow-y:auto;padding:14px}
  .center{grid-area:center;background:var(--bg);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
  .side{grid-area:side;background:var(--bg);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
  .tickbar{grid-area:tick;background:var(--bg);display:flex;align-items:center;overflow:hidden;border-top:1px solid var(--line2)}

  /* ===== top bar ===== */
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-size:15px}
  .brand svg{width:30px;height:30px}
  .brand i{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.08em;color:var(--acc);font-family:var(--mono);padding:4px 10px;border:1px solid rgba(51,224,182,.3);border-radius:30px;background:rgba(51,224,182,.06)}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc);animation:beat 1.4s infinite}
  @keyframes beat{0%,100%{opacity:1}50%{opacity:.35}}
  .tgrow{flex:1}
  .cmdk{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;color:var(--muted);font-size:13px;min-width:220px;transition:.2s}
  .cmdk:hover{border-color:rgba(255,255,255,.24)}
  .cmdk kbd{margin-left:auto;font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:5px;border:1px solid var(--line)}
  .tbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;transition:.2s}
  .tbtn:hover{border-color:rgba(255,255,255,.24);background:var(--panel2)}
  .tbtn svg{width:18px;height:18px;stroke:var(--muted)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-weight:700;color:#04221a}

  /* ===== rail (domain layers) ===== */
  .rhead{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin:6px 6px 12px;font-family:var(--mono)}
  .layer{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;border:1px solid transparent;margin-bottom:5px;transition:.2s;cursor:pointer}
  .layer:hover{background:var(--panel)}
  .layer.on{background:var(--panel);border-color:var(--line)}
  .layer .dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;box-shadow:0 0 8px currentColor}
  .layer .nm{flex:1;min-width:0}
  .layer .nm b{font-size:13px;font-weight:600;display:block}
  .layer .nm .br{height:3px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:5px;overflow:hidden}
  .layer .nm .br i{display:block;height:100%;border-radius:3px;background:currentColor;transition:width .6s ease}
  .layer .rd{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .layer .tg{width:30px;height:18px;border-radius:20px;background:rgba(255,255,255,.12);position:relative;flex:0 0 auto;transition:.2s}
  .layer .tg::after{content:"";position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}
  .layer.on .tg{background:var(--acc)}.layer.on .tg::after{left:14px}

  /* ===== center: map + kpis ===== */
  .mapcard{position:relative;border-radius:var(--r);overflow:hidden;background:linear-gradient(160deg,#0a1422,#0b1730);border:1px solid var(--line);flex:1;min-height:340px;display:flex;flex-direction:column}
  .map-top{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line2)}
  .map-top b{font-size:13px}.map-top .sub{font-size:11px;color:var(--muted2);font-family:var(--mono)}
  .map-top .seg{margin-left:auto;display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px}
  .map-top .seg button{padding:5px 11px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--muted)}
  .map-top .seg button.on{background:var(--panel2);color:var(--text)}
  .mapsvg{flex:1;width:100%}
  .zone{cursor:pointer;transition:opacity .3s,filter .2s}
  .zone:hover{filter:brightness(1.3)}
  .zone.dim{opacity:.28}
  .zlabel{font-size:9.5px;fill:#fff;font-family:var(--mono);pointer-events:none}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .kpi{padding:14px;border-radius:var(--r-sm);background:var(--panel);border:1px solid var(--line)}
  .kpi .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-family:var(--mono)}
  .kpi b{font-family:var(--display);font-size:1.7rem;display:block;margin-top:6px;line-height:1}
  .kpi .d{font-size:11px;font-family:var(--mono);margin-top:4px}
  .up{color:var(--acc)}.down{color:var(--rose)}

  /* ===== side: detail + signals ===== */
  .card{border-radius:var(--r);background:var(--panel);border:1px solid var(--line);padding:15px}
  .card h3{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .det .nm{font-family:var(--display);font-size:1.3rem;margin-bottom:3px}
  .det .ds{font-size:12.5px;color:var(--muted);margin-bottom:13px}
  .det .rows{display:flex;flex-direction:column;gap:9px}
  .det .row{display:flex;align-items:center;gap:10px;font-size:12.5px}
  .det .row .k{color:var(--muted);flex:1}
  .det .row .v{font-family:var(--mono);color:var(--text)}
  .det .row .mini{width:54px;height:4px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden}
  .det .row .mini i{display:block;height:100%;border-radius:4px}
  .feed{flex:1;display:flex;flex-direction:column;min-height:0}
  .feed .list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;flex:1}
  .sig{display:flex;gap:11px;padding:10px;border-radius:10px;transition:.2s}
  .sig:hover{background:var(--panel)}
  .sig .ic{width:30px;height:30px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;font-size:14px}
  .sig .c{min-width:0}
  .sig .c b{font-size:12.5px;font-weight:600;display:block}
  .sig .c span{font-size:11.5px;color:var(--muted);display:block;line-height:1.4}
  .sig .c time{font-size:10.5px;color:var(--muted2);font-family:var(--mono)}
  @keyframes newin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .sig.fresh{animation:newin .5s ease;background:rgba(51,224,182,.06)}

  /* ===== ticker ===== */
  .ticker{display:flex;gap:38px;white-space:nowrap;width:max-content;animation:slide 42s linear infinite;padding-left:18px}
  .ticker:hover{animation-play-state:paused}
  .ti{display:inline-flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .ti b{color:var(--text)}.ti .pu{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
  @keyframes slide{to{transform:translateX(-50%)}}

  /* ===== command palette ===== */
  .scrim{position:fixed;inset:0;z-index:80;background:rgba(4,8,16,.7);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;padding:14vh 18px}
  .scrim.on{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .pal{width:100%;max-width:560px;background:#0e1626;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;animation:popin .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes popin{from{opacity:0;transform:translateY(-14px) scale(.98)}to{opacity:1;transform:none}}
  .pal input{width:100%;background:transparent;border:none;outline:none;padding:18px 20px;font-size:16px;color:var(--text);border-bottom:1px solid var(--line2)}
  .pal .res{max-height:54vh;overflow-y:auto;padding:8px}
  .pres{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:10px;cursor:pointer}
  .pres.sel{background:var(--panel2)}
  .pres .ic{width:30px;height:30px;border-radius:8px;background:var(--panel);display:grid;place-items:center;font-size:15px;flex:0 0 auto}
  .pres .t{flex:1;min-width:0}.pres .t b{font-size:13.5px;display:block}.pres .t span{font-size:11.5px;color:var(--muted2)}
  .pres .tag{font-size:10px;font-family:var(--mono);color:var(--muted2);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
  .pal .foot{display:flex;gap:16px;padding:9px 16px;border-top:1px solid var(--line2);font-size:11px;color:var(--muted2);font-family:var(--mono)}

  /* ===== slide-over sheet ===== */
  .sheet-scrim{position:fixed;inset:0;z-index:70;background:rgba(4,8,16,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
  .sheet-scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;top:0;right:0;bottom:0;z-index:71;width:min(560px,94vw);background:#0a1120;border-left:1px solid var(--line);transform:translateX(100%);transition:transform .36s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .sheet.on{transform:none}
  .sheet .sh{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line2)}
  .sheet .sh h2{font-family:var(--display);font-weight:400;font-size:1.4rem}
  .sheet .sh .x{margin-left:auto;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;font-size:18px}
  .sheet .sb{overflow-y:auto;padding:18px 20px;flex:1}
  .ds-row{padding:13px 0;border-bottom:1px solid var(--line2);display:flex;gap:12px;align-items:flex-start}
  .ds-row .b{flex:1;min-width:0}.ds-row .b b{font-size:13.5px;display:block}.ds-row .b span{font-size:12px;color:var(--muted)}
  .pill{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap}
  .xrow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line2);font-size:13px}
  .xrow .ar{color:var(--acc)}.xrow .p{margin-left:auto;font-size:10.5px;font-family:var(--mono);padding:3px 9px;border-radius:20px;border:1px solid}
  .tierrow{padding:14px;border-radius:12px;border:1px solid var(--line);margin-bottom:10px;border-left-width:3px}
  .tierrow b{font-size:13.5px}.tierrow p{font-size:12.5px;color:var(--muted);margin-top:4px}

  /* ===== mobile ===== */
  .mtab{display:none}
  @media(max-width:980px){
    body{overflow:auto}
    .app{grid-template-columns:1fr;grid-template-rows:var(--bar) auto;grid-template-areas:"bar" "center";height:auto;min-height:100dvh;gap:0}
    .rail,.side{display:none}
    .rail.msheet,.side.msheet{display:flex;position:fixed;inset:auto 0 0 0;z-index:60;max-height:74vh;background:#0a1120;border-top:1px solid var(--line);border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .34s cubic-bezier(.2,.8,.2,1);padding:18px}
    .rail.msheet.on,.side.msheet.on{transform:none}
    .tickbar{display:none}
    .center{padding:14px 14px 84px}
    .cmdk{min-width:0}.cmdk span{display:none}
    .mtab{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;left:0;right:0;bottom:0;z-index:55;background:rgba(8,12,22,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
    .mtab button{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;font-size:10px;color:var(--muted);padding:5px 0}
    .mtab button svg{width:20px;height:20px;stroke:currentColor}
    .mtab button.on{color:var(--acc)}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .sheet{width:100vw}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="mk" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#33e0b6"/><stop offset="1" stop-color="#4d8dff"/></linearGradient></defs>
  <symbol id="amaraMark" viewBox="0 0 48 48"><rect width="48" height="48" rx="13" fill="url(#mk)"/><path d="M15.5 34 L24 15.5 L32.5 34" fill="none" stroke="#04221a" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/><line x1="19.5" y1="27.5" x2="28.5" y2="27.5" stroke="#04221a" stroke-width="3.4" stroke-linecap="round"/><circle cx="24" cy="11" r="2.6" fill="#04221a"/></symbol>
</svg>

<div class="app">
  <header class="topbar">
    <a class="brand" href="#"><svg aria-hidden="true"><use href="#amaraMark"/></svg> data<i>.amaravati</i></a>
    <span class="live"><i></i>LIVE TWIN</span>
    <div class="tgrow"></div>
    <button class="cmdk" id="cmdkBtn" aria-label="Open command palette"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg><span>Search city, commands…</span><kbd>⌘K</kbd></button>
    <button class="tbtn" id="aboutBtn" title="About"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 16v-5M12 8h.01"/></svg></button>
    <a class="tbtn" href="index.html" title="Glass dashboard"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></a>
    <button class="avatar" id="signBtn" title="Sign in">+</button>
  </header>

  <!-- LEFT RAIL · data layers -->
  <aside class="rail" id="rail">
    <div class="rhead">Data layers · live connectors</div>
    <div id="layers"></div>
  </aside>

  <!-- CENTER · twin + KPIs -->
  <section class="center">
    <div class="mapcard">
      <div class="map-top">
        <b>Amaravati digital twin</b><span class="sub" id="mapSub">all layers · live</span>
        <div class="seg"><button class="on" data-mode="layers">Layers</button><button data-mode="heat">Activity</button></div>
      </div>
      <svg class="mapsvg" id="map" viewBox="0 0 760 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Amaravati districts">
        <defs><linearGradient id="riv" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1a6f96"/><stop offset="1" stop-color="#2f6bf0"/></linearGradient></defs>
        <path d="M0 64 C200 30 360 96 760 50 L760 0 L0 0Z" fill="url(#riv)" opacity=".55"/>
        <text x="18" y="40" class="zlabel" opacity=".7">KRISHNA RIVERFRONT</text>
        <line x1="60" y1="330" x2="700" y2="150" stroke="#ffb454" stroke-width="2" stroke-dasharray="2 8" opacity=".45"/>
        <g id="zones"></g>
      </svg>
    </div>
    <div class="kpis" id="kpis"></div>
  </section>

  <!-- RIGHT · detail + signals -->
  <aside class="side" id="side">
    <div class="card det" id="detail"></div>
    <div class="card feed">
      <h3><span class="live" style="padding:2px 8px"><i></i></span> Live signals</h3>
      <div class="list" id="feed"></div>
    </div>
  </aside>

  <div class="tickbar"><div class="ticker" id="ticker"></div></div>
</div>

<!-- mobile tab bar -->
<nav class="mtab" id="mtab">
  <button data-m="twin" class="on"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M3 9l9-6 9 6v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>Twin</button>
  <button data-m="layers"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3 2 8l10 5 10-5Z"/><path d="M2 13l10 5 10-5"/></svg>Layers</button>
  <button data-m="signals"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>Signals</button>
  <button data-m="cmd"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>Search</button>
</nav>

<!-- command palette -->
<div class="scrim" id="palScrim"><div class="pal" role="dialog" aria-modal="true" aria-label="Command palette">
  <input id="palInput" placeholder="Search districts, layers, commands…" autocomplete="off" aria-label="Search">
  <div class="res" id="palRes"></div>
  <div class="foot"><span>↑↓ navigate</span><span>↵ select</span><span>esc close</span></div>
</div></div>

<!-- slide-over sheet -->
<div class="sheet-scrim" id="sheetScrim"></div>
<aside class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Panel">
  <div class="sh"><h2 id="sheetTitle">Panel</h2><button class="x" id="sheetX" aria-label="Close">×</button></div>
  <div class="sb" id="sheetBody"></div>
</aside>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* ===== concept data ===== */
const LAYERS=[
  {k:"land",t:"Land & Zoning",c:"#ffb454",r:.74,u:"% mapped",z:[0,1,2]},
  {k:"mobility",t:"Mobility",c:"#4d8dff",r:.62,u:"flow idx",z:[0,3,7]},
  {k:"water",t:"Water & River",c:"#33d0e0",r:.96,u:"% uptime",z:[7,8]},
  {k:"energy",t:"Energy",c:"#ffd24d",r:.71,u:"grid load",z:[2,4]},
  {k:"environ",t:"Environment",c:"#33e0b6",r:.83,u:"AQI good",z:[5,6,7]},
  {k:"safety",t:"Safety",c:"#ff6b8a",r:.9,u:"response",z:[0,4]},
  {k:"economy",t:"Economy",c:"#9b8cff",r:.66,u:"GVA idx",z:[2,3]},
  {k:"governance",t:"Governance",c:"#7ad0ff",r:.78,u:"% digital",z:[0,1]},
];
const DISTRICTS=[
  {t:"Government City",c:"#ff9933",x:120,y:150,ds:142,act:.8},{t:"Justice City",c:"#e7c46b",x:300,y:130,ds:64,act:.5},
  {t:"Finance City",c:"#33e0b6",x:470,y:150,ds:88,act:.66},{t:"Knowledge City",c:"#4d8dff",x:170,y:230,ds:121,act:.74},
  {t:"Health City",c:"#ff6b8a",x:340,y:215,ds:77,act:.6},{t:"Sports City",c:"#33d0e0",x:520,y:225,ds:39,act:.4},
  {t:"Media City",c:"#9b8cff",x:210,y:300,ds:45,act:.45},{t:"Tourism City",c:"#ffb454",x:390,y:295,ds:58,act:.7},
  {t:"Quantum Valley",c:"#7ad0ff",x:580,y:300,ds:96,act:.9},
];
const KPIS=[
  {l:"Open datasets",v:1240,fmt:"int",d:"+18 today",dir:"up"},
  {l:"Active exchanges",v:6,fmt:"int",d:"2 in review",dir:"up"},
  {l:"City KPI index",v:87,fmt:"int",suf:"/100",d:"▲ +1 w/w",dir:"up"},
  {l:"Riverfront level",v:12.4,fmt:"f1",suf:" m",d:"stable",dir:"up"},
];
const SIGS=[
  {ic:"🔄",bg:"#4d8dff",b:"Exchange approved",s:"DTCP → APCRDA · Layout Sanctions",t:"2m"},
  {ic:"📤",bg:"#33e0b6",b:"Dataset published",s:"Air Quality Index (CAAQMS) · open",t:"9m"},
  {ic:"⚠️",bg:"#ff6b8a",b:"Threshold alert",s:"Inner Ring Road · congestion rising",t:"14m"},
  {ic:"🛡️",bg:"#7ad0ff",b:"CRDA review opened",s:"ANPR Vehicle Movements · restricted",t:"22m"},
  {ic:"📈",bg:"#9b8cff",b:"KPI updated",s:"Quantum Valley ▲ +4 this week",t:"31m"},
];
const SIG_POOL=[
  {ic:"🚰",bg:"#33d0e0",b:"Telemetry sync",s:"Reservoir SCADA · pressure nominal"},
  {ic:"🌿",bg:"#33e0b6",b:"Sensor reading",s:"Green canopy cover · 31%"},
  {ic:"🚌",bg:"#4d8dff",b:"Transit pulse",s:"APSRTC positions · 15s refresh"},
  {ic:"🏗️",bg:"#ffb454",b:"Works progress",s:"Government Complex · 64% complete"},
  {ic:"112",bg:"#ff6b8a",b:"Response time",s:"Emergency · 7.8 min average"},
];
const DATASETS=[
  ["Land-Use Zoning Parcels","GeoJSON · APCRDA Planning","public"],["Layout & Plot Sanctions","REST API · DTCP","internal"],
  ["Inner Ring Road Traffic","GeoJSON · Transport","public"],["ANPR Vehicle Movements","API · Traffic Police","restricted"],
  ["Air Quality Index","REST API · APPCB","public"],["Reservoir & Supply (SCADA)","— · Water Utility","restricted"],
  ["Command Centre Feeds","— · Police","confidential"],["Ward Population & Density","CSV · DES","public"],
];
const EXCHANGES=[
  ["DTCP","APCRDA","Layout Sanctions","active"],["Irrigation","APCRDA","Riverfront Levels","active"],
  ["AP Police","Transport","ANPR Movements","review"],["Reg.&Stamps","AP EDB","Property Prices","agreement"],
  ["APCRDA","AP Police","Land-Loser Records","declined"],
];
const TIERS=[["Open","#33e0b6","Anyone can use, share and build on under an open licence."],["Internal","#4d8dff","Shared across agencies and verified partners; access logged."],["Sensitive","#ffb454","Needs a data-sharing agreement and purpose review."],["Confidential","#ff6b8a","Strict need-to-know; DPO approval and full audit."]];
const CLS={public:"Open",internal:"Internal",restricted:"Sensitive",confidential:"Confidential"};
const CLSC={public:"#33e0b6",internal:"#4d8dff",restricted:"#ffb454",confidential:"#ff6b8a"};
const STC={active:"#33e0b6",review:"#4d8dff",agreement:"#ffb454",declined:"#ff6b8a"};

/* ===== render: layers ===== */
let activeLayers=new Set(LAYERS.map(l=>l.k));
function drawLayers(){
  $("#layers").innerHTML=LAYERS.map(l=>`<div class="layer on" data-k="${l.k}" style="color:${l.c}">
    <span class="dot" style="background:${l.c}"></span>
    <span class="nm"><b style="color:var(--text)">${l.t}</b><span class="br"><i style="width:${Math.round(l.r*100)}%"></i></span></span>
    <span class="rd">${l.u.includes('%')||l.u.includes('idx')||l.u.includes('load')||l.u.includes('good')?Math.round(l.r*100):l.r}</span>
    <span class="tg"></span></div>`).join("");
}
function toggleLayer(k){
  const el=$(`.layer[data-k="${k}"]`); const on=el.classList.toggle("on");
  on?activeLayers.add(k):activeLayers.delete(k); paintMap();
  $("#mapSub").textContent=activeLayers.size===LAYERS.length?"all layers · live":`${activeLayers.size} layer${activeLayers.size===1?'':'s'} · live`;
}
/* ===== render: map ===== */
let mode="layers", selDist=2;
function activeZones(){const z=new Set();LAYERS.forEach(l=>{if(activeLayers.has(l.k))l.z.forEach(i=>z.add(i));});return z;}
function drawMap(){
  $("#zones").innerHTML=DISTRICTS.map((d,i)=>`<g class="zone" data-i="${i}">
    <rect x="${d.x}" y="${d.y}" width="118" height="50" rx="11" fill="${d.c}" opacity=".85"/>
    <text x="${d.x+11}" y="${d.y+22}" class="zlabel" style="font-weight:700">${d.t.split(' ')[0]}</text>
    <text x="${d.x+11}" y="${d.y+38}" class="zlabel" opacity=".8">${d.ds} sets</text></g>`).join("");
}
function paintMap(){
  const az=activeZones();
  $$('.zone').forEach(g=>{const i=+g.dataset.i;
    let dim=false;
    if(mode==="layers") dim=activeLayers.size<LAYERS.length && !az.has(i);
    const r=g.querySelector('rect');
    if(mode==="heat"){r.setAttribute('opacity',(0.3+DISTRICTS[i].act*0.65).toFixed(2));r.setAttribute('fill',DISTRICTS[i].act>.66?'#33e0b6':DISTRICTS[i].act>.45?'#ffb454':'#ff6b8a');}
    else{r.setAttribute('opacity','.85');r.setAttribute('fill',DISTRICTS[i].c);}
    g.classList.toggle('dim',dim);
    g.classList.toggle('on',i===selDist);
  });
}
function selectDistrict(i){selDist=i;paintMap();drawDetail();}
function drawDetail(){
  const d=DISTRICTS[selDist];
  const rels=LAYERS.filter(l=>l.z.includes(selDist));
  $("#detail").innerHTML=`<h3>◉ District focus</h3><div class="det"><div class="nm">${d.t}</div>
    <div class="ds">${d.ds} governed datasets · activity ${Math.round(d.act*100)}%</div>
    <div class="rows">${(rels.length?rels:LAYERS.slice(0,3)).map(l=>`<div class="row"><span class="k">${l.t}</span><span class="mini"><i style="width:${Math.round(l.r*100)}%;background:${l.c}"></i></span><span class="v">${Math.round(l.r*100)}</span></div>`).join("")}</div></div>`;
}
/* ===== kpis ===== */
function drawKpis(){
  $("#kpis").innerHTML=KPIS.map((k,i)=>`<div class="kpi"><div class="l">${k.l}</div><b data-ct="${k.v}" data-fmt="${k.fmt}" data-suf="${k.suf||''}">0</b><div class="d ${k.dir}">${k.d}</div></div>`).join("");
  $$('#kpis b[data-ct]').forEach(el=>{const to=+el.dataset.ct,fmt=el.dataset.fmt,suf=el.dataset.suf;let n=0;const step=to/38;const t=setInterval(()=>{n+=step;if(n>=to){n=to;clearInterval(t);}el.textContent=(fmt==="f1"?n.toFixed(1):Math.round(n).toLocaleString())+suf;},22);});
}
/* ===== signals feed ===== */
function sigHTML(s,fresh){return `<div class="sig${fresh?' fresh':''}"><div class="ic" style="background:${s.bg}22;color:${s.bg}">${s.ic}</div><div class="c"><b>${s.b}</b><span>${s.s}</span><time>${s.t||'now'}</time></div></div>`;}
function drawFeed(){$("#feed").innerHTML=SIGS.map(s=>sigHTML(s)).join("");}
function pushSignal(){const s={...SIG_POOL[Math.floor(Math.random()*SIG_POOL.length)],t:'now'};$("#feed").insertAdjacentHTML("afterbegin",sigHTML(s,true));const list=$("#feed");while(list.children.length>9)list.lastElementChild.remove();}
/* ===== ticker ===== */
function drawTicker(){const items=['Datasets 1,240','Exchanges 6 active','AQI 71 · Good','Riverfront 12.4 m','Solar 1.9 GWh','Transit +6.2%','Canopy 31%','KPI index 87'];const h=items.map(t=>{const[a,...b]=t.split(' ');return `<span class="ti"><span class="pu"></span>${a} <b>${b.join(' ')}</b></span>`;}).join('');$("#ticker").innerHTML=h+h;}

/* ===== command palette ===== */
const COMMANDS=[
  {ic:"📚",t:"Open Data Catalogue",s:"Browse governed datasets",tag:"sheet",run:()=>openSheet("catalogue")},
  {ic:"🔄",t:"Open Exchange register",s:"Inter-agency agreements",tag:"sheet",run:()=>openSheet("exchange")},
  {ic:"🛡️",t:"Open Governance & access",s:"Classification & tiers",tag:"sheet",run:()=>openSheet("governance")},
  {ic:"ℹ️",t:"About this console",s:"Concept & disclaimer",tag:"sheet",run:()=>openSheet("about")},
  {ic:"🟢",t:"Show all layers",s:"Reset data layers",tag:"action",run:()=>{activeLayers=new Set(LAYERS.map(l=>l.k));drawLayers();paintMap();$("#mapSub").textContent="all layers · live";}},
  {ic:"🔥",t:"Switch to Activity heatmap",s:"Map mode",tag:"action",run:()=>setMode("heat")},
  {ic:"🗺️",t:"Switch to Layers view",s:"Map mode",tag:"action",run:()=>setMode("layers")},
];
function allPalItems(){return [
  ...COMMANDS,
  ...DISTRICTS.map((d,i)=>({ic:"📍",t:d.t,s:`${d.ds} datasets · focus district`,tag:"district",run:()=>selectDistrict(i)})),
  ...LAYERS.map(l=>({ic:"◉",dot:l.c,t:`Toggle ${l.t}`,s:"Data layer",tag:"layer",run:()=>toggleLayer(l.k)})),
];}
let palItems=[], palSel=0;
function openPal(){$("#palScrim").classList.add("on");$("#palInput").value="";renderPal("");setTimeout(()=>$("#palInput").focus(),30);}
function closePal(){$("#palScrim").classList.remove("on");}
function renderPal(q){
  q=q.toLowerCase();
  palItems=allPalItems().filter(it=>(it.t+it.s+it.tag).toLowerCase().includes(q));
  palSel=0;
  $("#palRes").innerHTML=palItems.map((it,i)=>`<div class="pres${i===0?' sel':''}" data-i="${i}"><div class="ic" ${it.dot?`style="background:${it.dot}22;color:${it.dot}"`:''}>${it.dot?'●':it.ic}</div><div class="t"><b>${it.t}</b><span>${it.s}</span></div><span class="tag">${it.tag}</span></div>`).join("")||`<div style="padding:24px;text-align:center;color:var(--muted2)">No matches</div>`;
}
function moveSel(d){if(!palItems.length)return;palSel=(palSel+d+palItems.length)%palItems.length;$$('.pres').forEach((e,i)=>e.classList.toggle('sel',i===palSel));const sel=$('.pres.sel');if(sel)sel.scrollIntoView({block:"nearest"});}
function runSel(){const it=palItems[palSel];if(it){closePal();it.run();}}

/* ===== sheets ===== */
function sheetContent(k){
  if(k==="catalogue")return ["Data Catalogue",`<p style="color:var(--muted);margin-bottom:14px">A sample of governed datasets across the city's connectors.</p>`+DATASETS.map(d=>`<div class="ds-row"><div class="b"><b>${d[0]}</b><span>${d[1]}</span></div><span class="pill" style="color:${CLSC[d[2]]};border-color:${CLSC[d[2]]}">${CLS[d[2]]}</span></div>`).join("")];
  if(k==="exchange")return ["Exchange register",`<p style="color:var(--muted);margin-bottom:14px">Government-to-government exchanges under CRDA governance.</p>`+EXCHANGES.map(x=>`<div class="xrow"><b>${x[0]}</b><span class="ar">→</span><b>${x[1]}</b><span style="color:var(--muted);font-size:12px">· ${x[2]}</span><span class="p" style="color:${STC[x[3]]};border-color:${STC[x[3]]}">${x[3]}</span></div>`).join("")];
  if(k==="governance")return ["Governance & access",`<p style="color:var(--muted);margin-bottom:14px">Every dataset is graded across four tiers. Your authority decides access.</p>`+TIERS.map(t=>`<div class="tierrow" style="border-left-color:${t[1]}"><b style="color:${t[1]}">${t[0]}</b><p>${t[2]}</p></div>`).join("")];
  return ["About this console",`<p style="color:var(--muted);line-height:1.7"><b style="color:var(--text)">Amaravati Data Command Center</b> is a concept mission-control view of the governed city-data platform and digital twin.</p><p style="color:var(--muted2);font-size:12.5px;line-height:1.7;margin-top:16px"><b>Concept prototype — not an official product.</b> data.amaravati is an independent concept inspired by the public Amaravati master plan and the spirit of CRDA's data-governance vision. It is <b>not</b> a Government of Andhra Pradesh or APCRDA product and is not endorsed by either. It uses no official State Emblem or copyrighted master-plan artwork; the twin is an original interpretation and all figures are indicative. © 2026 data.amaravati concept.</p><div style="display:flex;gap:10px;margin-top:18px"><a class="pill" style="color:var(--acc);border-color:var(--acc);padding:8px 14px" href="index.html">↗ Glass dashboard</a><a class="pill" style="color:var(--blue);border-color:var(--blue);padding:8px 14px" href="visit.html">↗ Visit Amaravati</a></div>`];
}
function openSheet(k){const[t,b]=sheetContent(k);$("#sheetTitle").textContent=t;$("#sheetBody").innerHTML=b;$("#sheet").classList.add("on");$("#sheetScrim").classList.add("on");}
function closeSheet(){$("#sheet").classList.remove("on");$("#sheetScrim").classList.remove("on");}

/* ===== map mode ===== */
function setMode(m){mode=m;$$('.seg button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$("#mapSub").textContent=m==="heat"?"activity heatmap":"all layers · live";paintMap();}

/* ===== init + wiring ===== */
drawLayers();drawMap();paintMap();drawDetail();drawKpis();drawFeed();drawTicker();
$("#rail").addEventListener("click",e=>{const l=e.target.closest(".layer");if(l)toggleLayer(l.dataset.k);});
$("#map").addEventListener("click",e=>{const g=e.target.closest(".zone");if(g)selectDistrict(+g.dataset.i);});
$$('.seg button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
$("#cmdkBtn").onclick=openPal;
$("#aboutBtn").onclick=()=>openSheet("about");
$("#signBtn").onclick=()=>openSheet("about");
$("#sheetX").onclick=closeSheet;$("#sheetScrim").onclick=closeSheet;
$("#palScrim").addEventListener("click",e=>{if(e.target.id==="palScrim")closePal();});
$("#palInput").addEventListener("input",e=>renderPal(e.target.value));
$("#palRes").addEventListener("click",e=>{const r=e.target.closest(".pres");if(r){palSel=+r.dataset.i;runSel();}});
$("#palInput").addEventListener("keydown",e=>{if(e.key==="ArrowDown"){e.preventDefault();moveSel(1);}else if(e.key==="ArrowUp"){e.preventDefault();moveSel(-1);}else if(e.key==="Enter"){e.preventDefault();runSel();}});
addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openPal();}
  else if(e.key==="Escape"){closePal();closeSheet();closeMSheet();}
});
/* mobile sheets */
function closeMSheet(){$("#rail").classList.remove("msheet","on");$("#side").classList.remove("msheet","on");$$('.mtab button').forEach(b=>b.classList.remove("on"));$('.mtab button[data-m="twin"]').classList.add("on");}
$("#mtab").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;const m=b.dataset.m;
  closeMSheet();$$('.mtab button').forEach(x=>x.classList.toggle("on",x===b));
  if(m==="cmd"){openPal();}
  else if(m==="layers"){$("#rail").classList.add("msheet");requestAnimationFrame(()=>$("#rail").classList.add("on"));}
  else if(m==="signals"){$("#side").classList.add("msheet");requestAnimationFrame(()=>$("#side").classList.add("on"));}
  else{$("#rail").classList.remove("msheet","on");$("#side").classList.remove("msheet","on");window.scrollTo({top:0,behavior:"smooth"});}
});
/* live feel */
setInterval(pushSignal,7000);
</script>
</body>
</html>
