name: Deploy to GitHub Pages

# Secret-free CD: publishes the static web/ directory to GitHub Pages using the
# built-in GITHUB_TOKEN. Runs on every push to main. The Vercel deploy workflow
# remains for when Vercel secrets are configured; this guarantees a live site
# with zero external credentials. Security headers that Pages cannot serve are
# mirrored into the HTML (CSP via <meta>).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish web/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload web/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
